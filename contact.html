<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>اتصل بنا | xBloom Recipes Hub</title>
<meta name="description" content="تواصل مع فريق xBloom Recipes Hub — نرد على جميع استفساراتك.">
<link rel="canonical" href="https://xblm.ab-s.me/contact.html">
<meta property="og:title" content="اتصل بنا | xBloom Recipes Hub">
<meta property="og:url" content="https://xblm.ab-s.me/contact.html">
<meta name="robots" content="index, follow">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--gr:linear-gradient(135deg,#00A896,#4A90E2);--bg:#0A0A0A;--card:#1A1A1A;--up:#252525;--br:#2A2A2A;--t1:#fff;--t2:#A0A0A0;--ta:#00A896}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;direction:rtl}
a{color:var(--ta);text-decoration:none}
a:hover{text-decoration:underline}

.topbar{background:rgba(10,10,10,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--br);position:sticky;top:0;z-index:100;padding:0 20px}
.topbar-inner{max-width:780px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;gap:12px}
.topbar-logo{font-weight:900;font-size:1.1em;background:var(--gr);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.topbar-links{display:flex;gap:8px;align-items:center}
.topbar-links a{padding:6px 12px;border-radius:8px;font-size:.82em;font-weight:700;color:var(--t2);transition:.2s;white-space:nowrap}
.topbar-links a:hover{background:var(--card);color:var(--t1);text-decoration:none}
.topbar-home{padding:7px 14px;border-radius:9px;background:var(--gr);color:#fff !important;font-size:.82em;font-weight:700;white-space:nowrap;transition:.2s}
.topbar-home:hover{opacity:.85;text-decoration:none}

.container{max-width:600px;margin:0 auto;padding:48px 20px 80px}

.page-header{text-align:center;margin-bottom:40px}
.page-header::after{content:'';display:block;width:60px;height:3px;background:var(--gr);border-radius:3px;margin:16px auto 0}
.page-icon{font-size:2.8em;margin-bottom:14px;display:block}
.page-title{font-size:clamp(1.7em,4vw,2.3em);font-weight:900;background:var(--gr);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.3}

.contact-card{background:var(--card);border-radius:20px;border:1px solid var(--br);padding:36px 32px;position:relative;overflow:hidden}
.contact-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gr)}

.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.fg label{font-size:.82em;color:var(--t2);font-weight:700}
.fi{width:100%;padding:12px 14px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;color:var(--t1);font-size:15px;font-family:inherit;transition:.2s;direction:rtl}
.fi:focus{outline:none;border-color:var(--ta);background:rgba(0,168,150,.06);box-shadow:0 0 0 3px rgba(0,168,150,.12)}
.fi::placeholder{color:rgba(255,255,255,.25)}
textarea.fi{resize:vertical;min-height:120px;line-height:1.6}

.btn-submit{width:100%;padding:14px;border-radius:12px;background:var(--gr);border:none;color:#fff;font-size:1em;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;margin-top:4px}
.btn-submit:hover{opacity:.88}
.btn-submit:active{transform:scale(.98)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}

.form-status{padding:14px 18px;border-radius:10px;margin-top:14px;font-size:.88em;text-align:center;font-weight:700;display:none}
.form-status.ok{display:block;background:rgba(67,233,123,.1);border:1px solid rgba(67,233,123,.3);color:#43e97b}
.form-status.err{display:block;background:rgba(245,87,108,.1);border:1px solid rgba(245,87,108,.3);color:#f5576c}

.contact-info{margin-top:24px;padding-top:20px;border-top:1px solid var(--br)}
.contact-body-text{color:var(--t2);font-size:.88em;line-height:1.9;text-align:center}

.last-update{text-align:center;color:var(--t2);font-size:.78em;margin-top:32px;padding-top:20px;border-top:1px solid var(--br)}

@media(max-width:500px){
  .contact-card{padding:28px 18px}
  .topbar-inner{height:auto;padding:10px 0}
}
</style>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const db = getDatabase(initializeApp({
  apiKey:"AIzaSyDq370Yy4W-TfbyFL5rt4y3h3ngajJVIrE",
  databaseURL:"https://xbloom-recipes-hub-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"xbloom-recipes-hub"
}));

let WEB3FORMS_KEY = '';

onValue(ref(db,'pagesContent'), snap => {
  const p = snap.val() || {};
  if(p.web3forms_key) WEB3FORMS_KEY = p.web3forms_key;
  if(p.contact_body){
    const el = document.getElementById('dyn-body');
    if(el) el.innerHTML = p.contact_body;
  }
}, {onlyOnce:true});

window.submitContact = async function(e){
  e.preventDefault();
  const btn    = document.getElementById('submitBtn');
  const status = document.getElementById('formStatus');
  const name    = document.getElementById('f-name').value.trim();
  const email   = document.getElementById('f-email').value.trim();
  const subject = document.getElementById('f-subject').value.trim();
  const message = document.getElementById('f-message').value.trim();

  if(!name || !email || !message) return;

  btn.disabled = true;
  btn.textContent = '⏳ جاري الإرسال...';
  status.className = 'form-status';

  try {
    // 1) Save to Firebase
    await push(ref(db,'contactMessages'), {
      name, email, subject, message,
      ts: Date.now(),
      status: 'new'
    });

    // 2) Send email via Web3Forms (if key is configured)
    if(WEB3FORMS_KEY) {
      await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: {'Content-Type':'application/json','Accept':'application/json'},
        body: JSON.stringify({
          access_key: WEB3FORMS_KEY,
          name, email,
          subject: subject || 'رسالة جديدة من نموذج التواصل',
          message,
          from_name: 'xBloom Recipes Hub'
        })
      });
    }

    status.className = 'form-status ok';
    status.textContent = '✅ تم إرسال رسالتك بنجاح! سنتواصل معك قريباً.';
    document.getElementById('contactForm').reset();
  } catch(err) {
    status.className = 'form-status err';
    status.textContent = '❌ حدث خطأ أثناء الإرسال، يرجى المحاولة مجدداً.';
  }

  btn.disabled = false;
  btn.textContent = '📨 إرسال الرسالة';
};
</script>
</head>
<body>

<nav class="topbar">
  <div class="topbar-inner">
    <span class="topbar-logo">☕ xBloom Recipes</span>
    <div class="topbar-links">
      <a href="about.html">من نحن</a>
      <a href="privacy-policy.html">الخصوصية</a>
      <a href="/" class="topbar-home">← الوصفات</a>
    </div>
  </div>
</nav>

<div class="container">

  <div class="page-header">
    <span class="page-icon">✉️</span>
    <h1 class="page-title">اتصل بنا</h1>
  </div>

  <div class="contact-card">
    <form id="contactForm" onsubmit="submitContact(event)">
      <div class="fg">
        <label for="f-name">الاسم *</label>
        <input class="fi" type="text" id="f-name" placeholder="اسمك الكريم" required>
      </div>
      <div class="fg">
        <label for="f-email">البريد الإلكتروني *</label>
        <input class="fi" type="email" id="f-email" placeholder="example@email.com" required>
      </div>
      <div class="fg">
        <label for="f-subject">الموضوع</label>
        <input class="fi" type="text" id="f-subject" placeholder="موضوع رسالتك (اختياري)">
      </div>
      <div class="fg">
        <label for="f-message">الرسالة *</label>
        <textarea class="fi" id="f-message" placeholder="اكتب رسالتك هنا..." required></textarea>
      </div>
      <button class="btn-submit" type="submit" id="submitBtn">📨 إرسال الرسالة</button>
      <div class="form-status" id="formStatus"></div>
    </form>

    <div class="contact-info">
      <div class="contact-body-text" id="dyn-body"></div>
    </div>
  </div>

  <div class="last-update">
    <a href="about.html">من نحن</a> · <a href="privacy-policy.html">سياسة الخصوصية</a>
  </div>

</div>
</body>
</html>
